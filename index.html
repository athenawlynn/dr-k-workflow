const PasswordGate = ({ children }) => {
  const [isAuthenticated, setIsAuthenticated] = useState(false);
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [isChecking, setIsChecking] = useState(true);
  const CORRECT_PASSWORD = 'jekoch78';
  const AUTH_KEY = 'drk-workflow-auth';
  useEffect(() => {
    const authData = localStorage.getItem(AUTH_KEY);
    if (authData) {
      try { const { remembered } = JSON.parse(authData); if (remembered) setIsAuthenticated(true); } catch (e) { localStorage.removeItem(AUTH_KEY); }
    }
    setIsChecking(false);
  }, []);
  const handleSubmit = (e) => {
    e.preventDefault();
    if (password === CORRECT_PASSWORD) { localStorage.setItem(AUTH_KEY, JSON.stringify({ remembered: true, device: navigator.userAgent })); setIsAuthenticated(true); setError(''); }
    else { setError('Incorrect password'); setPassword(''); }
  };
  const handleLogout = () => { localStorage.removeItem(AUTH_KEY); setIsAuthenticated(false); setPassword(''); };
  if (isChecking) return <div className="min-h-screen bg-gradient-to-br from-indigo-600 to-purple-700 flex items-center justify-center"><div className="text-white text-xl">Loading...</div></div>;
  if (!isAuthenticated) return (
    <div className="min-h-screen bg-gradient-to-br from-indigo-600 to-purple-700 flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div className="text-center mb-8"><h1 className="text-3xl font-serif font-bold text-indigo-900 mb-2">Dr. K Workflow</h1><p className="text-gray-600">Please enter password to continue</p></div>
        <form onSubmit={handleSubmit} className="space-y-4">
          <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Enter password" className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg text-lg focus:border-indigo-500 focus:outline-none" autoFocus />
          {error && <p className="text-red-600 text-sm text-center">{error}</p>}
          <button type="submit" className="w-full py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-semibold text-lg">🔐 Access Workflow</button>
        </form>
      </div>
    </div>
  );
  return children(handleLogout);
};

  const toggleDarkMode = () => setDarkMode(d => { localStorage.setItem('darkMode',(!d).toString()); return !d; });

    const today = new Date();

    const suf = day%10===1&&day!==11?'st':day%10===2&&day!==12?'nd':day%10===3&&day!==13?'rd':'th';
    const dateStr = today.toLocaleDateString('en-US',{weekday:'long',month:'long'}) + ' ' + day + suf;

    const tagOrder = ["This Week's Projects","Real Estate","Dr. Response","Office","Finance","Travel","Personal"];
    const sectionMap = {
      "This Week's Projects": "THIS WEEK'S PROJECTS",
      "Real Estate": "REAL ESTATE",
      "Dr. Response": "DR. RESPONSE",
      "Office": "OFFICE",
      "Finance": "FINANCE",
      "Travel": "TRAVEL",
      "Personal": "PERSONAL",
      "Other": "OTHER"
    };

    let recap = `Hi Dr. Koch, here is your Daily Recap for ${dateStr} in order of action item:\n\n`;

    tagOrder.forEach(tag => {
      const items = pendingTasks.filter(t => t.tag === tag);
      if (items.length > 0) {
        recap += `${sectionMap[tag]}\n`;
        items.forEach(t => {
          const urgentFlag = t.urgent ? ' ⚡ URGENT' : '';
          recap += `• [${t.category}] ${safeString(t.description)}${urgentFlag}\n`;
          if (safeString(t.notesDrK).trim()) recap += `  → ${safeString(t.notesDrK).trim()}\n`;
        });
        recap += '\n';
      }
    });

    // Other (anything not in the main tags)
    const otherItems = pendingTasks.filter(t => !tagOrder.includes(t.tag));
    if (otherItems.length > 0) {
      recap += `OTHER\n`;
      otherItems.forEach(t => {
        const urgentFlag = t.urgent ? ' ⚡ URGENT' : '';
        recap += `• [${t.category}] ${safeString(t.description)}${urgentFlag}\n`;
        if (safeString(t.notesDrK).trim()) recap += `  → ${safeString(t.notesDrK).trim()}\n`;
      });
      recap += '\n';
    }

    recap += `---\nTotal Active: ${activeTasks.length} | Completed: ${tasks.filter(t=>t.completed).length} | Pending: ${pendingTasks.length} | Urgent: ${pendingTasks.filter(t=>t.urgent).length}`;
    if (getComeBackTasks().length > 0) recap += ` | Come Back Later: ${getComeBackTasks().length}`;

    setTimeout(() => setRecapText(recap), 0);
  };

  const groupTasksBySection = (list) => {
    const s={"THIS WEEK'S PROJECTS":[],"REAL ESTATE":[],"DR. RESPONSE":[],"OFFICE RELATED":[],"FINANCE RELATED":[],"TRAVEL RELATED":[],"PERSONAL RELATED":[],"OTHER":[]};
    list.forEach(t=>{if(!t)return;const tag=safeString(t.tag);if(tag==="This Week's Projects")s["THIS WEEK'S PROJECTS"].push(t);else if(tag==='Real Estate')s["REAL ESTATE"].push(t);else if(tag==='Dr. Response')s["DR. RESPONSE"].push(t);else if(tag==='Finance')s["FINANCE RELATED"].push(t);else if(tag==='Office')s["OFFICE RELATED"].push(t);else if(tag==='Travel')s["TRAVEL RELATED"].push(t);else if(tag==='Personal')s["PERSONAL RELATED"].push(t);else s["OTHER"].push(t);});

                      <th className="px-4 py-3 text-left">Description</th>
                      <th className="px-4 py-3 text-left">Dates</th>
                      <th className="px-4 py-3 text-left">Location</th>
                      <th className="px-4 py-3 text-left">Seat / Room</th>
                      <th className="px-4 py-3 text-left">Conf #</th>
                      <th className="px-4 py-3 text-center">Notes</th>
                      <th className="px-4 py-3 text-center">Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    {(()=>{
                      let f = travelEntries;
                      if(travelTagFilter!=='all') f=f.filter(e=>e.tags?.includes(travelTagFilter));
                      if(travelSearchQuery.trim()){const q=travelSearchQuery.toLowerCase();f=f.filter(e=>(e.description||'').toLowerCase().includes(q)||(e.location||'').toLowerCase().includes(q)||(e.agenda||'').toLowerCase().includes(q));}
                      if(!f.length) return <tr><td colSpan="8" className="py-12 text-center text-gray-400">No entries found</td></tr>;
                      return f.map((e,i)=>{
                        const isPast = new Date(e.endDate||e.startDate+'T23:59:59') < today;
                        const isExpanded = expandedTravelId === e.id;
                        const isEditing = editingTravelId === e.id;
                        const rowBg = isPast ? (darkMode?'bg-gray-900':'bg-gray-50') : i%2===0 ? (darkMode?'bg-gray-800':'bg-white') : (darkMode?'bg-gray-750':'bg-gray-50/50');
                        return (
                          <React.Fragment key={e.id}>
                            <tr className={`border-t border-gray-100 ${rowBg} ${isPast?'opacity-50':''} hover:bg-blue-50/30 transition-colors`}>
                              <td className="px-4 py-3">
                                <span className={`inline-flex items-center gap-1 px-2 py-1 rounded text-xs font-semibold ${tagColors[e.tags?.[0]]||'bg-gray-100 text-gray-700'}`}>
                                  {icons[e.tags?.[0]]||'📋'} {e.tags?.[0]||e.type}
                                </span>
                              </td>
                              <td className="px-4 py-3 font-medium max-w-48">
                                {e.url
                                  ? <a href={e.url} target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:underline">{e.description} 🔗</a>
                                  : e.description
                                }
                              </td>
                              <td className="px-4 py-3 text-xs text-gray-500 whitespace-nowrap">
                                <div>{fmtD(e.startDate)}</div>
                                {e.endDate&&e.endDate!==e.startDate&&<div className="text-gray-400">→ {fmtD(e.endDate)}</div>}
                              </td>
                              <td className="px-4 py-3 text-xs text-gray-600 max-w-36">{e.location||'—'}</td>
                              <td className="px-4 py-3 text-xs font-mono text-gray-700">{e.seat||<span className="text-gray-300">—</span>}</td>
                              <td className="px-4 py-3 text-xs font-mono text-gray-600">{e.confirmation||<span className="text-gray-300">—</span>}</td>
                              <td className="px-4 py-3 text-center">
                                {e.agenda
                                  ? <button onClick={()=>setExpandedTravelId(isExpanded?null:e.id)} className={`text-xs px-2 py-1 rounded-full ${isExpanded?'bg-indigo-100 text-indigo-700':'bg-gray-100 text-gray-500 hover:bg-indigo-50 hover:text-indigo-600'}`}>{isExpanded?'▲ Hide':'▼ Notes'}</button>
                                  : <span className="text-gray-200 text-xs">—</span>
                                }
                              </td>
                              <td className="px-4 py-3 text-center whitespace-nowrap">
                                <button onClick={()=>startEditTravel(e)} className="text-blue-500 hover:text-blue-700 mr-2 text-sm">✏️</button>
                                <button onClick={()=>deleteTravelEntry(e.id)} className="text-red-400 hover:text-red-600 text-base font-bold leading-none">×</button>
                              </td>
                            </tr>
                            {/* Expanded agenda row */}
                            {isExpanded && !isEditing && (
                              <tr className="border-t border-indigo-100">
                                <td colSpan="8" className="px-6 py-4 bg-indigo-50/40">
                                  <div className="text-xs font-bold text-indigo-400 uppercase tracking-widest mb-2">Notes / Agenda</div>
                                  <pre className="text-sm text-gray-700 whitespace-pre-wrap font-sans leading-relaxed">{e.agenda}</pre>
                                </td>
                              </tr>
                            )}
                            {/* Edit row */}
                            {isEditing && (
                              <tr className="border-t-2 border-blue-300">
                                <td colSpan="8" className="px-5 py-5 bg-blue-50">
                                  <div className="text-sm font-bold text-blue-700 mb-3">✏️ Editing: {e.description}</div>
                                  <div className="flex flex-wrap gap-2 mb-3">
                                    {travelTags.map(tag=><button key={tag} onClick={()=>setTravelForm({...travelForm,tags:travelForm.tags.includes(tag)?travelForm.tags.filter(t=>t!==tag):[...travelForm.tags,tag]})} className={`px-3 py-1.5 rounded-lg text-xs font-semibold ${travelForm.tags.includes(tag)?'bg-cyan-500 text-white':'bg-gray-200 text-gray-600'}`}>{icons[tag]} {tag}</button>)}
                                  </div>
                                  <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
                                    <div className="md:col-span-2"><label className="text-xs font-semibold text-gray-500 block mb-1">Description / Title</label><input type="text" value={travelForm.description} onChange={ev=>setTravelForm({...travelForm,description:ev.target.value})} className="w-full px-3 py-2 border rounded-lg text-sm"/></div>
                                    <div><label className="text-xs font-semibold text-gray-500 block mb-1">Start Date</label><input type="date" value={travelForm.startDate} onChange={ev=>setTravelForm({...travelForm,startDate:ev.target.value})} className="w-full px-3 py-2 border rounded-lg text-sm"/></div>
                                    <div><label className="text-xs font-semibold text-gray-500 block mb-1">End Date</label><input type="date" value={travelForm.endDate} onChange={ev=>setTravelForm({...travelForm,endDate:ev.target.value})} className="w-full px-3 py-2 border rounded-lg text-sm"/></div>
                                    <div className="md:col-span-2"><label className="text-xs font-semibold text-gray-500 block mb-1">Location / Venue</label><input type="text" value={travelForm.location} onChange={ev=>setTravelForm({...travelForm,location:ev.target.value})} className="w-full px-3 py-2 border rounded-lg text-sm"/></div>
                                    <div><label className="text-xs font-semibold text-gray-500 block mb-1">Seat / Room #</label><input type="text" value={travelForm.seat} onChange={ev=>setTravelForm({...travelForm,seat:ev.target.value})} placeholder="e.g. 8A, Room 412" className="w-full px-3 py-2 border rounded-lg text-sm"/></div>
                                    <div><label className="text-xs font-semibold text-gray-500 block mb-1">Confirmation #</label><input type="text" value={travelForm.confirmation} onChange={ev=>setTravelForm({...travelForm,confirmation:ev.target.value})} className="w-full px-3 py-2 border rounded-lg text-sm"/></div>
                                    <div className="md:col-span-4"><label className="text-xs font-semibold text-gray-500 block mb-1">URL (makes title a link)</label><input type="url" value={travelForm.url} onChange={ev=>setTravelForm({...travelForm,url:ev.target.value})} placeholder="https://..." className="w-full px-3 py-2 border rounded-lg text-sm"/></div>
                                  </div>
                                  <div className="mb-3"><label className="text-xs font-semibold text-gray-500 block mb-1">Notes / Agenda / Flight Details</label><textarea value={travelForm.agenda} onChange={ev=>setTravelForm({...travelForm,agenda:ev.target.value})} placeholder="Flight number, depart time, hotel address, agenda, anything..." rows={5} className="w-full px-3 py-2 border rounded-lg text-sm resize-y font-mono"/></div>
                                  <div className="flex gap-2">
                                    <button onClick={saveEditTravel} className="px-6 py-2 bg-green-500 text-white rounded-lg text-sm font-semibold hover:bg-green-600">✓ Save</button>
                                    <button onClick={cancelEditTravel} className="px-4 py-2 bg-gray-300 text-gray-700 rounded-lg text-sm hover:bg-gray-400">Cancel</button>
                                  </div>
                                </td>
                              </tr>
                            )}
                          </React.Fragment>
                        );
                      });
                    })()}
                  </tbody>
                </table>
              </div>

              {/* ── ADD NEW ENTRY FORM ── */}
              <div className={`mt-6 rounded-xl border-2 border-dashed border-gray-200 p-5 ${darkMode?'bg-gray-700':'bg-gray-50'}`}>
                <h4 className={`text-base font-bold mb-4 ${darkMode?'text-white':'text-gray-700'}`}>➕ Add Travel Entry</h4>
                <div className="flex flex-wrap gap-2 mb-4">
                  {travelTags.map(tag=><button key={tag} onClick={()=>setTravelForm({...travelForm,tags:travelForm.tags.includes(tag)?travelForm.tags.filter(t=>t!==tag):[...travelForm.tags,tag]})} className={`px-3 py-1.5 rounded-lg text-xs font-semibold ${travelForm.tags.includes(tag)?'bg-cyan-500 text-white':'bg-gray-200 text-gray-600 hover:bg-gray-300'}`}>{icons[tag]} {tag}</button>)}
                </div>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
                  <div className="md:col-span-2"><label className="text-xs font-semibold text-gray-500 block mb-1">Description / Title *</label><input type="text" value={travelForm.description} onChange={(e)=>setTravelForm({...travelForm,description:e.target.value})} placeholder="e.g. ATL to Phoenix, Marriott Downtown" className="w-full px-3 py-2 border rounded-lg text-sm"/></div>
                  <div><label className="text-xs font-semibold text-gray-500 block mb-1">Start Date *</label><input type="date" value={travelForm.startDate} onChange={(e)=>setTravelForm({...travelForm,startDate:e.target.value})} className="w-full px-3 py-2 border rounded-lg text-sm"/></div>
                  <div><label className="text-xs font-semibold text-gray-500 block mb-1">End Date</label><input type="date" value={travelForm.endDate} onChange={(e)=>setTravelForm({...travelForm,endDate:e.target.value})} className="w-full px-3 py-2 border rounded-lg text-sm"/></div>
                  <div className="md:col-span-2"><label className="text-xs font-semibold text-gray-500 block mb-1">Location / Venue</label><input type="text" value={travelForm.location} onChange={(e)=>setTravelForm({...travelForm,location:e.target.value})} placeholder="City or address" className="w-full px-3 py-2 border rounded-lg text-sm"/></div>
                  <div><label className="text-xs font-semibold text-gray-500 block mb-1">Seat / Room #</label><input type="text" value={travelForm.seat} onChange={(e)=>setTravelForm({...travelForm,seat:e.target.value})} placeholder="e.g. 8A" className="w-full px-3 py-2 border rounded-lg text-sm"/></div>
                  <div><label className="text-xs font-semibold text-gray-500 block mb-1">Confirmation #</label><input type="text" value={travelForm.confirmation} onChange={(e)=>setTravelForm({...travelForm,confirmation:e.target.value})} className="w-full px-3 py-2 border rounded-lg text-sm"/></div>
                  <div className="md:col-span-4"><label className="text-xs font-semibold text-gray-500 block mb-1">URL (makes title a link)</label><input type="url" value={travelForm.url} onChange={(e)=>setTravelForm({...travelForm,url:e.target.value})} placeholder="https://..." className="w-full px-3 py-2 border rounded-lg text-sm"/></div>
                </div>
                <div className="mb-4"><label className="text-xs font-semibold text-gray-500 block mb-1">Notes / Agenda / Flight Details</label><textarea value={travelForm.agenda} onChange={(e)=>setTravelForm({...travelForm,agenda:e.target.value})} placeholder="Flight number, depart time, seat class, hotel address, event agenda..." rows={4} className="w-full px-3 py-2 border rounded-lg text-sm resize-y font-mono"/></div>
                <button onClick={addTravelEntry} className="w-full py-2.5 bg-blue-600 text-white rounded-lg font-semibold text-sm hover:bg-blue-700">➕ Add Entry</button>
              </div>
            </div>

            {/* ── CALENDAR ── */}
            <div className="mb-10 pt-6 border-t-2 border-gray-100"><Calendar year={calendarYear}/></div>

            {/* ── FEDERAL HOLIDAYS ── */}
            <div className="pt-6 border-t-2 border-gray-100">
              <h3 className={`text-xl font-bold mb-4 ${darkMode?'text-white':'text-indigo-900'}`}>🇺🇸 2026 Federal Holidays</h3>
              <div className="bg-red-50 rounded-xl p-5"><div className="grid grid-cols-1 md:grid-cols-2 gap-3">{federalHolidays.map((h,i)=><div key={i} className="flex justify-between items-center p-2 bg-white rounded-lg border border-red-200"><span className="font-medium text-gray-800">{h.name}</span><span className="text-sm text-red-600 font-mono">{new Date(h.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span></div>)}</div></div>
            </div>
          </div>
          );
        })()}

      </div>
    </div>
  );
};

const App = () => <PasswordGate>{(handleLogout) => <DailyTaskTracker onLogout={handleLogout}/>}</PasswordGate>;
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
